version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: payment_app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment
      POSTGRES_PORT: 5432
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/payment_db
      SYNC_DATABASE_URL: postgresql://postgres:postgres@db:5432/payment_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
    env_file:
      - ./.env
    command: >
      sh -c "
        echo 'Applying pending migrations...' &&
        until pg_isready -h db -p 5432 -U postgres; do
          sleep 2
        done &&
        alembic upgrade head &&
        echo 'Starting application...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
volumes:
  postgres_data: